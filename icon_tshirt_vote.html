<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Voting System</title>
<style>
  :root {
    --night-blue: #03506F;
    --morning-blue: #05B2E8;
    --sun-yellow: #FFDE00;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; }
  body, .icon-vote-root {
    font-family: 'Outfit', 'Calibri', Arial, sans-serif;
    background: var(--white);
    color: var(--night-blue);
    margin: 0;
    padding: 0;
  }
  .icon-vote-root {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  .header-bar {
    background: linear-gradient(135deg, var(--night-blue) 0%, var(--morning-blue) 100%);
    border-radius: 14px;
    padding: 24px 28px;
    color: var(--white);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-bar h1 {
    font-family: 'Outfit', serif;
    font-size: 24px;
    margin: 0 0 4px 0;
    letter-spacing: 0.3px;
  }
  .header-bar p {
    margin: 0;
    font-size: 14px;
    opacity: 0.92;
  }
  .icon-logo-img {
    height: 28px;
    width: auto;
    display: block;
    margin-bottom: 6px;
  }
  .instructions {
    background: #F4FAFC;
    border-left: 4px solid var(--morning-blue);
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 22px;
    line-height: 1.5;
  }
  .instructions b { color: var(--night-blue); }
  
  /* Container now accurately wraps the slots */
  .rank-tray {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    width: 100%;
  }
  .rank-slot {
    flex: 1;
    min-width: 140px;
    border: 2px dashed #cfe6ee;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    background: #fbfefe;
    position: relative;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .rank-slot.filled {
    border-style: solid;
  }
  .rank-slot .rank-label {
    position: absolute;
    top: -10px;
    left: 10px;
    background: var(--night-blue);
    color: white;
    font-size: 11px;
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .rank-slot[data-rank="1"] { border-color: var(--sun-yellow); }
  .rank-slot[data-rank="1"] .rank-label { background: #B8940A; }
  .rank-slot[data-rank="2"] { border-color: var(--morning-blue); }
  .rank-slot[data-rank="3"] { border-color: var(--night-blue); }
  .rank-slot img {
    max-width: 100%;
    max-height: 70px;
    object-fit: contain;
    border-radius: 6px;
  }
  .rank-slot .empty-text {
    font-size: 12px;
    color: #9db4bd;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    margin-bottom: 26px;
  }
  .card {
    border: 2px solid #e7f2f5;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    background: #fff;
    position: relative;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(3,80,111,0.15);
    border-color: var(--morning-blue);
  }
  .card.selected {
    border-color: var(--sun-yellow);
    box-shadow: 0 0 0 3px rgba(255,222,0,0.35);
  }
  .card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    display: block;
  }
  .card .label {
    text-align: center;
    font-size: 12px;
    padding: 6px 4px;
    font-weight: 600;
    color: var(--night-blue);
    background: #fafdfe;
  }
  .card .badge {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--sun-yellow);
    color: var(--night-blue);
    font-weight: bold;
    font-size: 13px;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .card.selected .badge { display: flex; }
  .name-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    align-items: center;
    flex-wrap: wrap;
  }
  .name-row input {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    border: 2px solid #e7f2f5;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  .name-row input:focus {
    outline: none;
    border-color: var(--morning-blue);
  }
  .submit-btn {
    background: var(--night-blue);
    color: white;
    border: none;
    padding: 13px 28px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s ease;
    font-family: inherit;
  }
  .submit-btn:hover { background: #023d54; }
  .submit-btn:disabled {
    background: #b7cbd2;
    cursor: not-allowed;
  }
  .reset-btn {
    background: none;
    border: 2px solid #cfe6ee;
    color: var(--night-blue);
    padding: 11px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .status-msg {
    margin-top: 14px;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 8px;
  }
  .status-msg.success { background: #eafaf0; color: #1a7a45; }
  .status-msg.error { background: #fdecea; color: #b3261e; }
  .divider {
    height: 1px;
    background: #e7f2f5;
    margin: 32px 0 24px;
  }
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .results-header h2 {
    font-family: 'Outfit', serif;
    font-size: 19px;
    color: var(--night-blue);
    margin: 0;
  }
  .refresh-btn {
    background: none;
    border: 1px solid var(--morning-blue);
    color: var(--morning-blue);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .results-list { display: flex; flex-direction: column; gap: 10px; }
  .result-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fafdfe;
    border: 1px solid #e7f2f5;
    border-radius: 10px;
    padding: 8px 12px;
  }
  .result-row img {
    width: 46px;
    height: 46px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .result-row .rname { font-size: 13px; font-weight: 600; width: 90px; flex-shrink: 0; }
  .bar-track {
    flex: 1;
    background: #eef6f8;
    border-radius: 6px;
    height: 18px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sun-yellow), var(--morning-blue));
    border-radius: 6px;
    transition: width 0.4s ease;
  }
  .score-num {
    font-size: 13px;
    font-weight: bold;
    color: var(--night-blue);
    width: 70px;
    text-align: right;
    flex-shrink: 0;
  }
  .privacy-note {
    font-size: 12px;
    color: #7d939b;
    margin-top: 6px;
  }
  .voter-count {
    font-size: 13px;
    color: #4b6b76;
  }
</style>
</head>
<body>

<div class="icon-vote-root">
  <div class="header-bar">
    <div>
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAZAAAACFCAYAAAB1065Q..." class="icon-logo-img" alt="Logo" />
      <h1>T-Shirt Design Vote</h1>
      <p>Rank your favorite corporate layout options</p>
    </div>
  </div>

  <div class="instructions">
    <b>How to Vote:</b> Click on your preferred design alternatives from the catalog below to lock in your selections.
  </div>

  <div class="rank-tray">
    <div class="rank-slot" data-rank="1">
      <div class="rank-label">1ST CHOICE</div>
      <div class="empty-text">Click a design below</div>
    </div>
    <div class="rank-slot" data-rank="2">
      <div class="rank-label">2ND CHOICE</div>
      <div class="empty-text">Click a design below</div>
    </div>
    <div class="rank-slot" data-rank="3">
      <div class="rank-label">3RD CHOICE</div>
      <div class="empty-text">Click a design below</div>
    </div>
  </div>

  </div>

</body>
</html>
